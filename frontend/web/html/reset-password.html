<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>U-Konek+ - Reset Password</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="wrap">
        <div class="card" role="main">
            <div class="brand">
                <h1>Reset Password</h1>
                <h4>Enter your new password below.</h4>
            </div>

            <form id="reset-password-form" novalidate>
                <div class="field">
                    <label class="inputLabel" for="new-password">New Password</label>
                    <input id="new-password" type="password" aria-describedby="new-password-help" placeholder="e.g., SecurePass123" required />
                    <div id="new-password-help" class="small">Use at least 6 characters with a mix of letters and numbers.</div>
                </div>

                <div class="field">
                    <label class="inputLabel" for="confirm-new-password">Confirm New Password</label>
                    <input id="confirm-new-password" type="password" placeholder="Re-enter your new password" required />
                </div>

                <div class="actions">
                    <button type="submit" class="btn" id="reset-password-submit-btn">
                        <span class="btn-spinner" aria-hidden="true"></span>
                        <span class="btn-label">RESET PASSWORD</span>
                    </button>
                </div>
                <div id="reset-password-msg" class="note" aria-live="polite" style="display:none"></div>
            </form>

            <div class="actions" style="margin-top: 18px;">
                <a href="/html/index.html" class="link">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.port === '5500'
            ? `${window.location.protocol}//${window.location.hostname}:5000`
            : '';
        const LOGIN_PAGE_URL = API_BASE ? `${API_BASE}/html/index.html` : '/html/index.html';
        const form = document.getElementById('reset-password-form');
        const msg = document.getElementById('reset-password-msg');
        const submitBtn = document.getElementById('reset-password-submit-btn');
        const submitLabel = submitBtn.querySelector('.btn-label');

                const EYE_OPEN_ICON = `
<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
    <path fill="currentColor" d="M12 5c-5.5 0-9.3 4.1-10.7 6.1a1.5 1.5 0 0 0 0 1.8C2.7 14.9 6.5 19 12 19s9.3-4.1 10.7-6.1a1.5 1.5 0 0 0 0-1.8C21.3 9.1 17.5 5 12 5zm0 11a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-2.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z"/>
</svg>`;

                const EYE_CLOSED_ICON = `
<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
    <path fill="currentColor" d="M2.3 1.3a1 1 0 0 0-1.4 1.4l3 3A13.8 13.8 0 0 0 1.3 11a1.5 1.5 0 0 0 0 1.8C2.7 14.9 6.5 19 12 19a12 12 0 0 0 4.6-.9l3.1 3.1a1 1 0 1 0 1.4-1.4zm7.5 10.3a2.5 2.5 0 0 0 3.6 2.4l-3.5-3.5c0 .4-.1.7-.1 1.1zM12 7a5 5 0 0 1 5 5c0 .7-.1 1.3-.4 1.9l1.5 1.5a13.8 13.8 0 0 0 4.6-4.4 1.5 1.5 0 0 0 0-1.8C21.3 9.1 17.5 5 12 5c-1.4 0-2.7.3-3.8.8l1.5 1.5c.6-.2 1.5-.3 2.3-.3z"/>
</svg>`;

                function setupPasswordVisibilityToggles(root = document) {
                        const passwordInputs = root.querySelectorAll('input[type="password"]');

                        passwordInputs.forEach((input) => {
                                if (input.dataset.toggleAttached === 'true') {
                                        return;
                                }

                                const wrapper = document.createElement('div');
                                wrapper.className = 'password-input-wrap';
                                input.parentNode.insertBefore(wrapper, input);
                                wrapper.appendChild(input);

                                const toggleBtn = document.createElement('button');
                                toggleBtn.type = 'button';
                                toggleBtn.className = 'password-toggle';
                                toggleBtn.setAttribute('aria-label', 'Show password');
                                toggleBtn.setAttribute('aria-pressed', 'false');
                                toggleBtn.innerHTML = EYE_OPEN_ICON;

                                toggleBtn.addEventListener('click', () => {
                                        const showPassword = input.type === 'password';
                                        input.type = showPassword ? 'text' : 'password';
                                        toggleBtn.innerHTML = showPassword ? EYE_CLOSED_ICON : EYE_OPEN_ICON;
                                        toggleBtn.setAttribute('aria-label', showPassword ? 'Hide password' : 'Show password');
                                        toggleBtn.setAttribute('aria-pressed', showPassword ? 'true' : 'false');
                                });

                                wrapper.appendChild(toggleBtn);
                                input.dataset.toggleAttached = 'true';
                        });
                }

                setupPasswordVisibilityToggles();

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            submitBtn.classList.toggle('is-loading', isLoading);
            submitLabel.textContent = isLoading ? 'UPDATING PASSWORD...' : 'RESET PASSWORD';
        }

        function getTokenFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = getTokenFromUrl();
            const password = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-new-password').value;

            msg.style.display = 'none';

            if (!token) {
                msg.style.display = 'block';
                msg.style.color = '#dc2626';
                msg.textContent = 'Reset token is missing from the URL.';
                return;
            }

            if (password.length < 6) {
                msg.style.display = 'block';
                msg.style.color = '#dc2626';
                msg.textContent = 'Password must be at least 6 characters.';
                return;
            }

            if (password !== confirmPassword) {
                msg.style.display = 'block';
                msg.style.color = '#dc2626';
                msg.textContent = 'Passwords do not match.';
                return;
            }

            setLoading(true);
            try {
                const response = await fetch(`${API_BASE}/api/staff/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password, confirmPassword })
                });

                const data = await response.json();

                msg.style.display = 'block';
                if (response.ok) {
                    msg.style.color = '#15803d';
                    msg.textContent = data.message || 'Password reset successful. Redirecting to login...';
                    setTimeout(() => {
                        window.location.href = LOGIN_PAGE_URL;
                    }, 1500);
                } else {
                    msg.style.color = '#dc2626';
                    msg.textContent = data.message || 'Failed to reset password.';
                }
            } catch (error) {
                console.error('Reset password error:', error);
                msg.style.display = 'block';
                msg.style.color = '#dc2626';
                msg.textContent = 'Server connection failed.';
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
